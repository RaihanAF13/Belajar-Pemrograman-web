    <script>
        let nm = 0; // ini adalah variabel yang menyimpan nama
        let i = 0; // ini adalah index array. index ibaratkan nomor gerbong kereta
        bil1 = 3;
        bil2 = 4;

        // max2 berfungsi untuk mencari nilai terbesar dari dua bilangan
        function max2(bil1, bil2) {
            if (bil1 > bil2) {
                return bil1;
            } else {
                return bil2;
            }
        }

        bilMax = max2(bil1, bil2);
        console.log("bilmax: " + bilMax);
    </script>
