<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variabel</title>
</head>
<body>
   <script>
    var nama = "John Doe"; // variabel untuk menyimpan nama
    var umur = 30; // variabel untuk menyimpan umur
    document.write("Nama: " + nama + "<br>"); // menampilkan nama
    document.write("Umur: " + umur); // menampilkan umur
   </script>

</body>
</html>
