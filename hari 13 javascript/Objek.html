<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <script>
        // Membuat objek Mobil
        Mobil = new Object(); // membuat objek baru
        Mobil.nama = "Avanza"; // menambahkan properti nama
        Mobil.tahun = 2020; // menambahkan properti tahun
        Mobil.warna = "Hitam"; // menambahkan properti warna
        Mobil.berat = 1500; // menambahkan properti berat
        
        //Method
        Mobil.starte();
        mobil.belok_kiri();
        mobil.belok_kanan();
    </script>
