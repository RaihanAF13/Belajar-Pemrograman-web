<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>

/* 
ID selector digunakan untuk memilih elemen
yang memiliki atribut id tertentu.
Penulisannya menggunakan tanda pagar (#)
*/

#judul {
    color: blue;      /* membuat teks berwarna biru */
    font-size: 30px;  /* ukuran teks diperbesar */
}

</style>
</head>

<body>

<!-- 
Elemen ini memiliki id="judul"
CSS dengan selector #judul akan mempengaruhi elemen ini
-->
<h1 id="judul">Belajar CSS ID Selector</h1>

<p>Ini adalah paragraf biasa.</p>

</body>
</html>
