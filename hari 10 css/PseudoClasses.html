<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>

/* 
Pseudo-class digunakan untuk
mengubah style berdasarkan kondisi tertentu
*/

/* kondisi ketika mouse diarahkan ke link */
a:hover {
    color: red;
}

/* kondisi ketika link belum dikunjungi */
a:link {
    color: blue;
}

/* kondisi ketika link sudah pernah dikunjungi */
a:visited {
    color: purple;
}

</style>
</head>

<body>

<!-- link ini akan berubah warna saat disentuh mouse -->
<a href="https://google.com">Pergi ke Google</a>

</body>
</html>
