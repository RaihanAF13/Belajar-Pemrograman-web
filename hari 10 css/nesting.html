<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>

/* 
Selector ini berarti:
pilih elemen <p> yang berada di dalam <div>
*/

div p {
    color: red; /* hanya paragraf di dalam div yang berubah */
}

</style>
</head>

<body>

<div>
    <!-- paragraf ini akan berwarna merah -->
    <p>Paragraf di dalam div</p>
</div>

<!-- paragraf ini tidak terkena CSS -->
<p>Paragraf di luar div</p>

</body>
</html>
