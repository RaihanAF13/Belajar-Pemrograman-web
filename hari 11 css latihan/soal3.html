<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Selector Css</title>
    <style>
        p.merah{
            color: rgb(255, 0, 0);
        }
        p.biru{
            color: blue;
        }
        p.hijau{
            color: green;
        }
    </style>
</head>
<body>
    <p class="merah">Ini adalah paragraf merah</p>
    <p class="biru">Ini adalah paragraf biru</p>
    <p class="hijau">Ini adalah paragraf hijau</p>
</body>
</html>
