<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styling Button</title>
    <style>
        button {
            background-color: rgb(0, 191, 255);
            color: white;
            border: none;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: rgb(0, 119, 255);
        }
    </style>
</head>
<body>
    <h2>Button styling</h2>
    <button>Click Me</button>
</body>
</html>
