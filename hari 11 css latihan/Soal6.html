<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover Effect</title>
    <style>
        p {
            font-size: 20px;
            transition: all 0.5s ease;
        }
        p:hover {
            color: red;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <p>Hover over this text to see the effect.</p>
</body>
</html>
