<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil</title>
    <style>
        h2{
            color: blue;
            text-align: center;
        }
        p{
            font-size: 18px;
        }
        .mybutton{
            background-color: rgb(21, 255, 0);
            color: white;
            border: none;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            transition-duration: 0.3s;
        }
        .mybutton:hover {
            background-color: rgb(33, 103, 0);
        }

    </style>
</head>
<body>
    <h2>Profil</h2>
    <p>nama: Raihan</p>
    <button class="mybutton">Click Me</button>
</body>
</html>
