<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Contoh Elemen Inline</title>
    <style>
        .container {
            width: 500px;
            border: 1px solid black;
        }
        .box {
            width: 100px;
            height: 100px;
            border: 1px solid black;
            display: inline-block;
        }
        .text {
            display: inline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text">Judul</h1>
        <p class="text">Ini adalah paragraf pertama.</p>
        <p class="text">Ini adalah paragraf kedua.</p>
        <div class="box"></div>
        <div class="box"></div>
        <a href="#" class="text">Tautan</a>
        <span class="text">Teks biasa</span>
    </div>
</body>
</html>
