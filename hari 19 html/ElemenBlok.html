<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elemen Blok</title>
<style>
        .container {
            width: 500px;
            border: 1px solid black;
        }
        .box {
            width: 100px;
            height: 100px;
            border: 1px solid black;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Judul</h1>
        <p>Paragraf pertama.</p>
        <p>Paragraf kedua.</p>
        <ul>
            <li>Item pertama.</li>
            <li>Item kedua.</li>
        </ul>
        <div class="box"></div>
        <div class="box"></div>
    </div>
    <!--Elemen blok (block element) adalah elemen HTML yang:
    Selalu mulai dari baris baru
    Lebarnya otomatis penuh satu baris (full width)
        Mendorong elemen lain ke bawah-->
</body>
</html>
