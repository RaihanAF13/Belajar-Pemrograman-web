<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Html</title>
    <style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
  }
  .container {
    width: 80%;
    margin: auto;
    overflow: hidden;
  }
  .profile-img {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    border: #fff 10px solid;
    display: block;
    margin-left: auto;
    margin-right: auto;
  }
  .profile-info h2 {
    position: relative;
    font-size: 20px;
    text-align: center;
    margin-top: -15%;
  }
  .profile-info p {
    text-align: center;
    padding: 10px;
  }
  .skills ul {
    list-style: none;
    padding: 0;
  }
  .skills li {
    display: inline;
  }
  .skills li span {
    background-color: #c4c4c4;
    padding: 5px;
    margin: 5px;
    border-radius: 10px;
  }
</style>
</head>
<body>
    <!--Halaman Utama-->
    <img src="gambar-profil.jpg" alt="Gambar Profil">
    <h1>Nama Anda</h1>
    <p>Bio Anda</p>
    <ul>
  <li>Keahlian 1</li>
  <li>Keahlian 2</li>
  <li>Keahlian 3</li>
</ul>
<p>Email: email@example.com</p>
<p>Nomor Telepon: 08123456789</p>
</body>
</html>
