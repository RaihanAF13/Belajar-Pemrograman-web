<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atribute</title>
</head>
<body>
    <p>atribute adalah informasi tambahan yang digunakan untuk mengatur dan memodifikasi html </p>
    <h1 id="judul">Ini adalah judul</h1> <!--atribute id hany adigunakan sekali dalam html-->
    <p class="paragraph">ini adalah Paragraph</p> <!--atribute class bisa digunakan berkali-kali-->
    <p style="color:aqua">ini adalah paragraph bewarna aqua</p> <!--atribute style digunakan untuk mengatur warna, ukuran
     dan posisi elemen-->
    <p title="Halaman Utama" href="index.html">Halaman Utama</p> <!---->
    <form action="proses.php" method="post"> </form> <!-- Atribut action dalam HTML adalah atribut wajib pada elemen <form> 
        yang menentukan URL tujuan 
        pengiriman data formulir saat pengguna menekan tombol submit. Atribut ini mengarahkan data ke file -->
    <form action="proses.php" method="post">
  <!-- Atribut method dalam HTML digunakan untuk menentukan metode HTTP (GET atau POST) yang digunakan saat mengirimkan data formulir ke server. 
   Ini menentukan bagaimana data formulir 
   disatukan (di URL atau di badan permintaan) dan dikirim ke halaman yang ditentukan dalam atribut action-->
</form>

  <p>Ini adalah paragraf pertama.</p>
<p>Ini adalah paragraf kedua.</p>

</form>
</body>
</html>
